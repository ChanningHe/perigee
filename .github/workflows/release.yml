name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag vs Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=${TAG} cargo=${CARGO_VER}"
          if [ "${TAG}" != "${CARGO_VER}" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO_VER}. Use 'just release ${TAG}' to bump and tag together."
            exit 1
          fi

  build-x86_64:
    name: Build x86_64
    needs: [verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --target x86_64-unknown-linux-musl --release

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/perigee dist/perigee
          tar -czf "dist/perigee-${VERSION}-linux-x86_64-musl.tar.gz" -C dist perigee
          rm dist/perigee

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: dist/*.tar.gz

  build-aarch64:
    name: Build aarch64
    needs: [verify-version]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --target aarch64-unknown-linux-musl --release

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp target/aarch64-unknown-linux-musl/release/perigee dist/perigee
          tar -czf "dist/perigee-${VERSION}-linux-aarch64-musl.tar.gz" -C dist perigee
          rm dist/perigee

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aarch64
          path: dist/*.tar.gz

  release:
    name: Create Release
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${GITHUB_REF_NAME}")
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "## Changes since ${PREV_TAG:-initial}"
            echo ""
            echo "$LOG"
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*.tar.gz
          generate_release_notes: false
